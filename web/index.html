<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Radio 1190 Catalog</title>
    <link rel="icon" href="/images/favicon.ico" />
    <link rel="stylesheet" href="/styles.css?v=itunes-previews-1" />
  </head>
  <body>
    <header class="topbar">
      <div class="brandBlock">
        <a class="logoLink" href="/" aria-label="Radio 1190 Catalog home">
          <img class="siteLogo" src="/images/1190-logo-reversed-300x180.png" alt="Radio 1190" />
        </a>
        <div>
          <h1><a class="homeLink" href="/">Radio 1190 Catalog</a></h1>
          <p id="stats">Loading catalog…</p>
        </div>
      </div>
      <form id="searchForm" class="controls">
        <div class="searchStack">
          <input id="searchInput" type="search" placeholder="Search artist, album, or catalog #" autocomplete="off" />
          <div class="checkboxRow">
            <label class="checkboxControl">
              <input id="hideNaInput" type="checkbox" checked />
              <span>Hide N/A albums</span>
            </label>
            <label class="checkboxControl">
              <input id="searchTracksInput" type="checkbox" />
              <span>Search track names</span>
            </label>
          </div>
        </div>
        <div class="headerActions">
          <div class="userControls">
            <span id="sessionUser" class="sessionUser"></span>
            <div class="accountMenuWrap">
              <button id="accountMenuButton" class="accountMenuButton" type="button" aria-haspopup="menu" aria-expanded="false" aria-label="Account menu">
                <span class="hamburgerIcon" aria-hidden="true"><span></span><span></span><span></span></span>
              </button>
              <div id="accountMenu" class="accountMenu" role="menu" hidden>
                <a id="adminLink" href="/admin.html" role="menuitem" hidden>Admin</a>
                <button id="logoutButton" type="button" role="menuitem">Logout</button>
              </div>
            </div>
          </div>
          <a class="addButton mobileAddButton" href="/add.html">Add</a>
        </div>
      </form>
    </header>

    <main class="layout">
      <section class="results" aria-label="Catalog results">
        <div class="tableShell">
          <table>
            <thead id="albumHead"></thead>
            <tbody id="albumRows"></tbody>
          </table>
        </div>
        <nav class="pager">
          <button id="prevPage" type="button">Previous</button>
          <span id="pageLabel"></span>
          <button id="nextPage" type="button">Next</button>
        </nav>
      </section>

      <aside class="detail" id="detailPane" aria-live="polite">
        <div class="emptyState">Select an album to see catalog notes and music service metadata.</div>
      </aside>
    </main>

    <div class="lightbox" id="imageLightbox" hidden>
      <button class="lightboxClose" id="lightboxClose" type="button" aria-label="Close image">×</button>
      <img id="lightboxImage" alt="" />
    </div>

    <script src="/app.js?v=itunes-previews-1"></script>
  </body>
</html>
