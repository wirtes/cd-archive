<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin · Radio 1190 Music Archive</title>
    <link rel="stylesheet" href="/login.css" />
    <link rel="stylesheet" href="/admin.css" />
  </head>
  <body class="adminPage">
    <main class="adminShell">
      <section class="adminHero">
        <img src="/images/1190-logo-reversed-300x180.png" alt="Radio 1190" />
        <div>
          <h1>Create User</h1>
          <p>Manage access to the Radio 1190 Music Archive.</p>
        </div>
      </section>
      <section class="adminGrid">
        <form class="loginForm adminForm" id="userForm">
        <label>
          <span>Username</span>
          <input name="username" required />
        </label>
        <label>
          <span>Password</span>
          <input name="password" type="password" required />
        </label>
        <label class="roleOption">
          <input name="is_admin" type="checkbox" />
          <span>Admin</span>
        </label>
        <label class="roleOption">
          <input name="is_editor" type="checkbox" />
          <span>Editor</span>
        </label>
        <button type="submit">Save User</button>
        <p id="loginMessage" role="status" aria-live="polite"></p>
      </form>
        <section class="userPanel" id="userList" aria-live="polite"></section>
      </section>
      <a class="backLink" href="/">Back to archive</a>
    </main>
    <script src="/admin.js?v=roles-2"></script>
  </body>
</html>
