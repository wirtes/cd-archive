<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin · Radio 1190 Music Archive</title>
    <link rel="stylesheet" href="/login.css" />
    <link rel="stylesheet" href="/admin.css?v=archive-header-1" />
  </head>
  <body class="adminPage">
    <header class="topbar pageHeader">
      <div class="brandBlock">
        <a class="logoLink" href="/" aria-label="Radio 1190 Music Archive home">
          <img class="siteLogo" src="/images/1190-logo-reversed-300x180.png" alt="Radio 1190" />
        </a>
        <div>
          <h1><a class="homeLink" href="/">Admin</a></h1>
          <p>Manage access to the Radio 1190 Music Archive.</p>
        </div>
      </div>
      <div class="userControls">
        <span id="sessionUser" class="sessionUser"></span>
        <div class="accountMenuWrap">
          <button id="accountMenuButton" class="accountMenuButton" type="button" aria-haspopup="menu" aria-expanded="false" aria-label="Account menu">
            <span class="hamburgerIcon" aria-hidden="true"><span></span><span></span><span></span></span>
          </button>
          <div id="accountMenu" class="accountMenu" role="menu" hidden>
            <a href="/" role="menuitem">Archive</a>
            <a href="/mobile-add.html" role="menuitem">Mobile Add</a>
            <button id="logoutButton" type="button" role="menuitem">Logout</button>
          </div>
        </div>
      </div>
    </header>
    <main class="adminShell">
      <section class="adminGrid">
        <form class="loginForm adminForm" id="userForm">
        <label>
          <span>Username</span>
          <input name="username" required />
        </label>
        <label>
          <span>Password</span>
          <input name="password" type="password" required />
        </label>
        <label class="roleOption">
          <input name="is_admin" type="checkbox" />
          <span>Admin</span>
        </label>
        <label class="roleOption">
          <input name="is_editor" type="checkbox" />
          <span>Editor</span>
        </label>
        <button type="submit">Save User</button>
        <p id="loginMessage" role="status" aria-live="polite"></p>
      </form>
        <section class="userPanel" id="userList" aria-live="polite"></section>
      </section>
      <a class="backLink" href="/">Back to archive</a>
    </main>
    <script src="/admin.js?v=archive-header-1"></script>
  </body>
</html>
